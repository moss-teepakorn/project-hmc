name: Apply Migrations

on:
  workflow_dispatch:
    inputs:
      backup:
        description: 'Run system_config backup before applying migrations'
        required: false
        default: 'false'

jobs:
  apply-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run backup (optional)
        if: ${{ github.event.inputs.backup == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          bash scripts/backup_system_config.sh

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          bash scripts/run_migrations.sh

      - name: Success note
        run: echo "Migrations applied (if any)"
